name: Kafka Microservices CI Pipeline

# 1. Trigger the pipeline on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    # 2. Pull the code from your repository into the runner environment
    - name: Checkout Code
      uses: actions/checkout@v4

    # 3. Initialize Python inside the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.11'

    # 4. Install the identical dependencies you used locally
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kafka-python-ng flake8

    # 5. Security & Code Quality Check (Linting)
    # This ensures your code doesn't have syntax errors or messy spacing before deployment
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. Two-line max complexity.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6. Basic Compilation Verification
    # Since Kafka requires a running broker to execute completely, 
    # we verify that the scripts can compile and evaluate syntax without crashing.
    - name: Verify Python Script Compilation
      run: |
        python -m py_compile producer.py
        python -m py_compile consumer.py
